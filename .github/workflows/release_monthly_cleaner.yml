name: Full Smart Cleanup (Releases & Tags)

on:
  schedule:
    # Запуск в 00:00 каждого 1-го числа месяца
    - cron: '0 0 1 * *'
  workflow_dispatch: # Оставляем возможность запустить вручную

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Обязательно для удаления

    steps:
      - name: Delete Old Releases and Their Tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "### Загрузка данных... ###"
          
          # 1. Получаем JSON всех опубликованных релизов
          RELEASES_JSON=$(gh api --paginate repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft == false) | {id: .id, tag: .tag_name, created: .created_at}]')

          COUNT=$(echo "$RELEASES_JSON" | jq 'length')
          
          if [ "$COUNT" -le 10 ]; then
            echo "В репозитории $COUNT релизов. Очистка не требуется (минимум 10 последних всегда сохраняются)."
            exit 0
          fi

          # 2. Выделяем ID тех, кто прожил < 7 дней и находится за пределами ТОП-10
          DELETE_DATA=$(echo "$RELEASES_JSON" | jq -r '
            .[0:10] as $protected |
            .[10:] as $old_ones |
            range(0; ($old_ones | length) - 1) as $i |
            $old_ones[$i] as $curr |
            (if $i == 0 then $protected[-1] else $old_ones[$i-1] end) as $next |
            
            ((($next.created | fromdateiso8601) - ($curr.created | fromdateiso8601)) / 86400) as $days |
            
            if $days < 7 then "\($curr.id)|\($curr.tag)" else empty end
          ')

          if [ -z "$DELETE_DATA" ]; then
            echo "Стабильных старых релизов не найдено. Все остаются."
            exit 0
          fi

          for ITEM in $DELETE_DATA; do
            # Разделяем ID и TAG
            ID=$(echo "$ITEM" | cut -d'|' -f1)
            TAG=$(echo "$ITEM" | cut -d'|' -f2)
            
            echo "--- Удаление: $TAG ---"
            
            # 1. Удаляем сам релиз (и все вложенные файлы)
            echo "Удаляем релиз (ID: $ID)..."
            gh api --method DELETE "/repos/${{ github.repository }}/releases/$ID" || echo "Релиз уже удален."

            # 2. Удаляем Git-тег из репозитория
            echo "Удаляем Git-тег: $TAG..."
            gh api --method DELETE "/repos/${{ github.repository }}/git/refs/tags/$TAG" || echo "Тег не найден или уже удален."
          done

          echo "--------------------------------------------------------"
          echo "Полная очистка завершена!"